- name: install packages
  hosts: local
  connection: local
  become: yes
  tasks:
    - name : install packages
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop:
      - { name: "mysql", state: "absent" }
      - { name: "nginx", state: "present" }
      - { name: "zip", state: "present" } 