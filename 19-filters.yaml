- name: demo on filters
  hosts: local
  connection: local

  vars:
    topics: "linux, shell, ansible, terraform"

    tagsList:
      name: ansible
      project: roboshop
      component: catalogue

    tagsMap: [
      { 
      - "key": "name",
        "value": "ansible"
      },
      { 
        "key": "project",
        "value": "roboshop"
      },
      {
        "key": "component",
        "value": "catalogue"   
      }
     ]
  
  tasks:
    - name: greeting
      ansible.builtin.debug:
        msg: "Hi Sivakumar, {{ GREETING | default('Good Morning') }}"

    - name: convert string to list
      ansible.builtin.debug:
        msg: "{{ topics | split(', ') }}"

    - name: convert map to list
      ansible.builtin.debug:
        msg: "{{ tagsList | dict2items }}"

    - name: convert list to map
      ansible.builtin.debug:
        msg: "{{ tagsMap | items2dict }}"